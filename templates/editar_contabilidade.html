{% extends 'base.html' %}
{% block title %}Editar Contabilidade{% endblock %}
{% block page_title %}Editar Contabilidade{% endblock %}
{% block content %}
<div class="card">
<form method="post" class="grid2">
    <div class="field"><label>Nome</label><input name="nome" value="{{cont.nome}}" required></div>
    <div class="field"><label>CNPJ</label><input name="cnpj" value="{{cont.cnpj or ''}}"></div>
    <div class="field"><label>E-mail</label><input type="email" name="email" value="{{cont.email or ''}}" required></div>
    <div class="field"><label>Telefone</label><input name="telefone" value="{{cont.telefone or ''}}"></div>
    <div class="field"><label>Nova senha opcional</label><input name="senha" placeholder="Deixe em branco para manter"></div>
    <div><button class="btn">Salvar</button> <a class="btn btn-light" href="{{ url_for('contabilidades') }}">Voltar</a></div>
</form>
</div>
{% endblock %}
