
{% extends 'base.html' %}{% block title %}Editar Cliente{% endblock %}{% block page_title %}Editar Cliente{% endblock %}{% block content %}
<div class="card"><form method="post" enctype="multipart/form-data" class="grid2"><div class="field"><label>Razão Social</label><input name="razao" value="{{cliente.razao}}" required></div><div class="field"><label>CNPJ</label><input name="cnpj" value="{{cliente.cnpj or ''}}"></div><div class="field"><label>Contabilidade</label><select name="contabilidade_id"><option value="">Sem contabilidade</option>{% for c in contabs %}<option value="{{c.id}}" {% if cliente.contabilidade_id==c.id %}selected{% endif %}>{{c.nome}}</option>{% endfor %}</select></div><div class="field"><label>Ano do certificado</label><select name="ano_certificado"><option value="">Selecione</option>{% for a in anos %}<option value="{{a}}" {% if cliente.ano_certificado==a %}selected{% endif %}>{{a}}</option>{% endfor %}</select></div><div class="field"><label>Novo certificado</label><input type="file" name="certificado"></div><div class="field"><label>Senha certificado</label><input name="senha_certificado" value="{{cliente.senha_certificado or ''}}"></div><div><button class="btn">Salvar alterações</button> <a class="btn btn-light" href="{{ url_for('clientes') }}">Voltar</a></div></form></div>
{% endblock %}
