
{% extends 'base.html' %}{% block title %}Importar Clientes CSV{% endblock %}{% block page_title %}Importar Clientes CSV{% endblock %}{% block content %}
<div class="card"><p>Envie um CSV com as colunas: <b>razao</b>, <b>cnpj</b>, <b>contabilidade_id</b>, <b>ano_certificado</b>, <b>senha_certificado</b>.</p><p><a class="btn btn-light" href="{{ url_for('modelo_clientes_csv') }}">Baixar modelo CSV</a></p></div>
<div class="card"><form method="post" enctype="multipart/form-data" class="grid2"><div class="field"><label>Arquivo CSV</label><input type="file" name="arquivo_csv" accept=".csv" required></div><div class="field"><label>Contabilidade padrão opcional</label><select name="contabilidade_id"><option value="">Usar CSV / sem vínculo</option>{% for c in contabs %}<option value="{{c.id}}">{{c.id}} - {{c.nome}}</option>{% endfor %}</select></div><div><button class="btn">Importar clientes</button> <a class="btn btn-light" href="{{ url_for('clientes') }}">Voltar</a></div></form></div>
{% endblock %}
