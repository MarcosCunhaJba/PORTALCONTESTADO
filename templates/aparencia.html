{% extends 'base.html' %}
{% block title %}Aparência{% endblock %}
{% block page_title %}Aparência do Portal{% endblock %}
{% block content %}
<div class="card">
    <h2>Logos do sistema</h2>
    <p style="color:#64748b;">Envie a logo do menu e a logo da tela de login. Use PNG, JPG ou WEBP.</p>
</div>

<div class="card">
    <form method="post" enctype="multipart/form-data" class="grid2">
        <div class="field">
            <label>Logo do topo/menu</label>
            <input type="file" name="logo_topo" accept=".png,.jpg,.jpeg,.webp">
            <div style="margin-top:12px;">
                <img src="{{ url_for('static', filename=LOGO_TOPO) }}" style="max-width:260px;max-height:140px;object-fit:contain;background:white;border:1px solid #e5e7eb;border-radius:14px;padding:10px;">
            </div>
        </div>

        <div class="field">
            <label>Logo do login</label>
            <input type="file" name="logo_login" accept=".png,.jpg,.jpeg,.webp">
            <div style="margin-top:12px;">
                <img src="{{ url_for('static', filename=LOGO_LOGIN) }}" style="max-width:260px;max-height:140px;object-fit:contain;background:white;border:1px solid #e5e7eb;border-radius:14px;padding:10px;">
            </div>
        </div>

        <div>
            <button class="btn">Salvar logos</button>
        </div>
    </form>
</div>
{% endblock %}
