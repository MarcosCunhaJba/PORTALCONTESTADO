{% extends 'base.html' %}{% block title %}Configurar E-mail{% endblock %}{% block content %}<div class="card"><h2>Configuração de e-mail SMTP</h2><form method="post" class="grid2"><div class="field"><label>SMTP Host</label><input name="smtp_host" value="{{cfg.smtp_host}}"></div><div class="field"><label>Porta</label><input name="smtp_port" value="{{cfg.smtp_port}}"></div><div class="field"><label>E-mail remetente</label><input name="smtp_user" value="{{cfg.smtp_user}}"></div><div class="field"><label>Senha de app</label><input name="smtp_password" value="{{cfg.smtp_password}}" type="password"></div><div class="field"><label>Nome remetente</label><input name="remetente_nome" value="{{cfg.remetente_nome}}"></div><div><button class="btn">Salvar</button></div></form><p><small>Gmail exige senha de app. Sem configurar SMTP, o sistema gera o link ZIP, mas não envia e-mail automático.</small></p></div>{% endblock %}
