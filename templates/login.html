<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><title>Login - CH Contestado</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>:root{--azul:#0057B8;--azul-escuro:#0B2F5B;--amarelo:#F9C80E}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 15%, rgba(249,200,14,.22), transparent 28%),linear-gradient(135deg,#061B36,#0B2F5B 55%,#0057B8)}.card{width:410px;max-width:92vw;background:rgba(255,255,255,.96);border-radius:28px;padding:34px;box-shadow:0 34px 100px rgba(0,0,0,.35)}.logo{display:block;width:255px;max-width:100%;margin:0 auto 22px;background:#fff;border-radius:18px;padding:8px;box-shadow:0 10px 26px rgba(11,47,91,.10)}h1{font-size:25px;color:var(--azul-escuro);margin:0;text-align:center}p{text-align:center;color:#64748b;margin:8px 0 24px}label{display:block;font-size:13px;font-weight:900;color:#475569;margin-top:12px}input{width:100%;padding:13px;border:1px solid #d7e0ea;border-radius:14px;margin-top:6px;font-size:14px}button{width:100%;border:0;border-radius:14px;background:linear-gradient(135deg,var(--azul),#00428D);color:white;padding:14px;font-weight:900;margin-top:20px;cursor:pointer}.flash{background:#fff7d6;border:1px solid #fde68a;color:#7c2d12;padding:10px;border-radius:12px;margin-bottom:12px;font-size:13px;font-weight:700}.footer{text-align:center;margin-top:18px;color:#64748b;font-size:12px;font-weight:700}</style></head><body><div class="card"><img class="logo" src="{{ url_for('static', filename='logo_ch_contestado.svg') }}" alt="CH Contestado"><h1>Portal de Documentos</h1><p>Acesse sua área de documentos contábeis.</p>{% with messages = get_flashed_messages() %}{% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}{% endwith %}<form method="post"><label>E-mail</label><input type="email" name="email" required autofocus><label>Senha</label><input type="password" name="senha" required><button type="submit">Entrar</button></form><div class="footer">SOFTWARE DE GESTÃO • 49 9 9176-2559</div></div></body></html>
