<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - CH Contestado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root{--azul:#0b2f5b;--azul2:#123f76;--amarelo:#f9c80e;}
        *{box-sizing:border-box}
        body{margin:0;font-family:Segoe UI,Arial,sans-serif;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#071f3d,#0b2f5b);}
        .card{width:380px;max-width:92vw;background:#fff;border-radius:24px;padding:34px;box-shadow:0 30px 90px rgba(0,0,0,.35)}
        .logo{display:block;max-width:240px;max-height:90px;object-fit:contain;margin:0 auto 20px}
        h1{font-size:24px;color:#172033;margin:0;text-align:center}
        p{text-align:center;color:#64748b;margin:8px 0 24px}
        label{display:block;font-size:13px;font-weight:800;color:#475569;margin-top:12px}
        input{width:100%;padding:12px;border:1px solid #d7e0ea;border-radius:12px;margin-top:6px;font-size:14px}
        button{width:100%;border:0;border-radius:12px;background:var(--azul);color:#fff;padding:13px;font-weight:900;margin-top:20px;cursor:pointer}
        button:hover{background:var(--azul2)}
        .flash{background:#fff7d6;border:1px solid #fde68a;color:#7c2d12;padding:10px;border-radius:10px;margin-bottom:12px;font-size:13px}
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="{{ url_for('static', filename='logo_ch_contestado.png') }}" alt="CH Contestado">
        <h1>Portal de Documentos</h1>
        <p>Acesse sua área de documentos contábeis.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for m in messages %}
                    <div class="flash">{{ m }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <label>E-mail</label>
            <input type="email" name="email" required autofocus>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
